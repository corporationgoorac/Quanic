<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#121212">
    
    <link rel="manifest" href="../manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Quanic">
    <link rel="apple-touch-icon" href="../images/icon.png">

    <title>Settings - Quanic</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* CORE FOUNDATION (Upgraded UI, Same Theme) */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        
        html, body {
            height: 100vh !important; height: 100dvh !important; width: 100vw !important;
            background-color: #121212; color: #ffffff; font-family: 'Inter', sans-serif;
            overflow: hidden !important; position: fixed !important; left: 0 !important; top: 0 !important;
            overscroll-behavior: none !important; user-select: none !important;
        }

        .app-container {
            display: flex; flex-direction: column; height: 100%; width: 100%;
            background: #121212; 
            transform: translateZ(0); 
            -webkit-transform: translate3d(0,0,0);
        }

        /* SVG ICONS */
        .svg-icon { width: 24px; height: 24px; fill: currentColor; vertical-align: middle; }

        /* HEADER - Glassmorphism */
        header {
            position: absolute; top: 0; left: 0; right: 0;
            height: calc(60px + env(safe-area-inset-top));
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; padding-top: calc(env(safe-area-inset-top) + 6px);
            background: #121212; 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: none !important; 
            z-index: 2000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        
        .icon-btn {
            background: none; border: none; 
            color: #ffffff; display: flex; align-items: center; justify-content: center; 
            padding: 5px; border-radius: 50%; cursor: pointer; transition: background 0.3s ease;
        }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .icon-btn:active { background: rgba(255, 255, 255, 0.15); transform: scale(0.92); }

        .page-title { font-size: 1.15rem; font-weight: 600; letter-spacing: 0.3px; background: linear-gradient(90deg, #E1306C, #FF7A00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* MAIN CONTENT */
        main {
            flex: 1; margin-top: calc(60px + env(safe-area-inset-top));
            padding: 20px; overflow-y: auto; scroll-behavior: smooth;
            display: flex; flex-direction: column;
            transform: translateZ(0); 
            -webkit-transform: translate3d(0,0,0);
            will-change: transform;
        }

        /* PROFILE SECTION - Modern Gradient Ring */
        .profile-section {
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 35px; margin-top: 15px;
            width: 100%;
            padding: 0 10px;
        }
        
        .profile-pic {
            width: 105px; height: 105px; border-radius: 50%; object-fit: cover;
            padding: 3px; background: linear-gradient(135deg, #E1306C, #FF7A00);
            box-shadow: 0 0 30px rgba(225, 48, 108, 0.4); 
            margin-bottom: 18px;
        }
        
        .user-name { 
            font-size: 1.5rem; 
            font-weight: 700; 
            letter-spacing: -0.5px; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            text-align: center;
            display: block;
        }

        .user-username {
            font-size: 0.95rem;
            color: #b466ff;
            font-family: 'Orbitron', 'Inter', sans-serif;
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* NEW EDIT PROFILE BUTTON */
        .main-edit-btn {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.05); 
            color: #ffffff; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 8px 22px; 
            border-radius: 20px; 
            font-size: 0.85rem; 
            font-weight: 600;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            transition: all 0.2s ease;
        }
        .main-edit-btn:hover { 
            background: rgba(255, 255, 255, 0.1); 
            border-color: rgba(225, 48, 108, 0.4); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }
        .main-edit-btn:active { transform: scale(0.95); }
        .main-edit-btn .svg-icon { width: 16px; height: 16px; color: #E1306C; }

        /* RECENTLY PLAYED SECTION */
        .section-title {
            font-size: 0.85rem; color: #a0a0ab;
            text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600;
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 4px;
        }

        /* UPGRADED RECENT GRID (6 Songs, Sleeker UI) */
        .recent-grid {
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 30px;
        }
        .recent-grid-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            overflow: hidden; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px);
            padding-right: 8px; 
        }
        .recent-grid-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(225, 48, 108, 0.3);
            transform: translateY(-2px);
        }
        .recent-grid-item:active { transform: scale(0.96); }
        
        .recent-grid-item img { 
            width: 50px; 
            height: 50px; 
            object-fit: cover; 
            border-radius: 8px;
            margin: 6px; /* Floating image look */
        }
        
        .recent-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1;
            margin-left: 4px;
        }
        
        .recent-grid-item .song-title { 
            font-size: 0.85rem; 
            font-weight: 600; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            color: #fff; 
        }
        
        .recent-grid-item .song-artist {
            font-size: 0.7rem;
            color: #a0a0ab;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        /* ENHANCED TOAST */
        .toast {
            position: fixed; top: calc(env(safe-area-inset-top) + 80px); left: 50%; 
            transform: translateX(-50%) translateY(-20px) scale(0.95);
            background: rgba(225, 48, 108, 0.95); color: white; padding: 12px 28px; 
            border-radius: 30px; font-size: 0.9rem; font-weight: 500; opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }

        /* LOGOUT BUTTON STYLES */
        .logout-container {
            margin-top: auto; 
            padding-top: 20px;
            padding-bottom: calc(80px + env(safe-area-inset-bottom, 30px)) !important; 
            width: 100%;
            display: flex;
            justify-content: center;
            transform: translateZ(0);
            -webkit-transform: translate3d(0,0,0);
            will-change: transform;
        }
        .logout-btn {
            background: rgba(255, 69, 0, 0.08);
            color: #ff4500;
            border: 1px solid rgba(255, 69, 0, 0.3);
            padding: 16px 24px; 
            border-radius: 25px; 
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            width: 90%; 
            max-width: 350px; 
            transform: translateZ(0);
            -webkit-transform: translate3d(0,0,0);
            will-change: transform, background, box-shadow;
        }
        .logout-btn:hover {
            background: rgba(255, 69, 0, 0.15);
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.2);
        }
        .logout-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => {
                    console.log('PWA SW registration failed: ', err);
                });
            });
        }
    </script>

    <script>
        // Shared SVGs
        window.SVGS = {
            arrow_back: '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>',
            edit: '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>',
            logout: '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>'
        };
    </script>

    <div class="app-container">
        
        <header>
            <div class="header-left">
                <button class="icon-btn" onclick="if(window.vibrateLight) window.vibrateLight(); window.location.href='home.html'">
                    <script>document.write(window.SVGS.arrow_back);</script>
                </button>
                <span class="page-title">Settings</span>
            </div>
        </header>

        <main id="settings-main-content">
            <div class="profile-section">
                <img src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" onerror="this.src='data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';" alt="Profile" class="profile-pic" id="profile-img">
                <h2 class="user-name" id="display-name">Loading...</h2>
                <p class="user-username" id="display-username">@loading</p>
                
                <button class="main-edit-btn" onclick="if(window.vibrateLight) window.vibrateLight(); window.location.href='setup.html'">
                    <script>document.write(window.SVGS.edit);</script> Edit Profile
                </button>
            </div>
            
            <div class="section-title">
                <span>Recently Played</span>
            </div>
            <div class="recent-grid" id="recent-history-grid">
                </div>

            <div class="logout-container">
                <button class="logout-btn" id="logout-btn">
                    <script>document.write(window.SVGS.logout);</script> Log Out
                </button>
            </div>
        </main>

        <div id="toast" class="toast">Action successful!</div>
    </div>

    <script type="module">
        import { auth, db } from '../config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ADDED HAPTIC FEEDBACK GLOBAL FUNCTIONS
        window.vibrateLight = () => { if(navigator.vibrate) navigator.vibrate(2); };
        window.vibrateMedium = () => { if(navigator.vibrate) navigator.vibrate(20); };

        // DOM Elements
        const profileImg = document.getElementById('profile-img');
        const displayName = document.getElementById('display-name');
        const toast = document.getElementById('toast');
        const logoutBtn = document.getElementById('logout-btn');

        let currentUser = null;

        // 1. INSTANT UI HYDRATION (From LocalStorage to prevent flicker)
        const cachedPhoto = localStorage.getItem('quanic_user_photo');
        const cachedName = localStorage.getItem('quanic_user_name');
        const cachedUsername = localStorage.getItem('quanic_user_username');

        // QUICK HYDRATION (Pre-Firebase Load)
        if (cachedPhoto && cachedPhoto.length > 5) {
            profileImg.src = cachedPhoto;
        }
        if (cachedName) {
            displayName.innerText = cachedName;
            adjustFontSize(cachedName);
        }
        if (cachedUsername) {
            document.getElementById('display-username').innerText = '@' + cachedUsername;
        }
        
        // PAGE CACHE HYDRATION (WHOLE PAGE LOCAL STORAGE)
        const storedPageHtml = localStorage.getItem('quanic_settings_whole_page');
        if (storedPageHtml && !cachedName) {
             document.getElementById('settings-main-content').innerHTML = storedPageHtml;
        }

        // Font Adjustment Function
        function adjustFontSize(text) {
            if (text.length > 20) {
                displayName.style.fontSize = "1.1rem";
            } else if (text.length > 15) {
                displayName.style.fontSize = "1.3rem";
            } else {
                displayName.style.fontSize = "1.5rem";
            }
        }

        // RECENT HISTORY RENDER ENGINE (Upgraded to 6 songs)
        function loadRecentHistoryGrid() {
            const historyContainer = document.getElementById('recent-history-grid');
            if(!historyContainer) return;

            try {
                // Pull directly from the 0ms local storage synced by home.html
                let historyArr = JSON.parse(localStorage.getItem('quanic_history')) || [];
                
                // Filter out any potential null/undefined objects first
                historyArr = historyArr.filter(track => track && track.title);
                
                if(historyArr.length === 0) {
                    historyContainer.innerHTML = '<p style="color: rgba(255,255,255,0.4); font-size: 0.9rem; grid-column: span 2; text-align: center; margin-top: 10px;">No recent songs found.</p>';
                    return;
                }
                
                historyContainer.innerHTML = '';
                
                // Take the top 6 songs instead of 4
                const top6 = historyArr.slice(0, 6);
                
                top6.forEach(track => {
                    const artistName = track.artist || 'Unknown Artist';
                    const div = document.createElement('div');
                    div.className = 'recent-grid-item';
                    
                    // Added artist name block for better UI flow
                    div.innerHTML = `
                        <img src="${track.imgUrl}" onerror="this.src='../images/icon.png'" alt="cover">
                        <div class="recent-info">
                            <span class="song-title">${track.title}</span>
                            <span class="song-artist">${artistName}</span>
                        </div>
                    `;
                    
                    // Tap to play integration via Deep Link Redirect
                    div.onclick = () => {
                        window.vibrateLight();
                        const deepLinkData = encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(track)))));
                        window.location.href = `home.html?play=${deepLinkData}`;
                    };
                    
                    historyContainer.appendChild(div);
                });
            } catch(e) {
                console.error("Error loading history grid", e);
            }
        }
        
        // Call it immediately
        loadRecentHistoryGrid();

        // Helper for Toast
        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.add('show');
            if(navigator.vibrate) navigator.vibrate([15, 20, 15]);
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // 2. FIREBASE AUTH & DATA FETCH
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                // Fetch latest data from Firestore
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    const data = userSnap.data();
                    
                    // Update UI and Cache
                    const name = data.name || user.displayName || "User";
                    const username = data.username || "unknown";
                    
                    displayName.innerText = name;
                    adjustFontSize(name);
                    document.getElementById('display-username').innerText = '@' + username;
                    
                    localStorage.setItem('quanic_user_name', name);
                    localStorage.setItem('quanic_user_username', username);
                    
                    // Profile Pic Fallback
                    const photoToUse = user.photoURL || data.photoURL || cachedPhoto;
                    if (photoToUse && photoToUse.length > 5) {
                        profileImg.src = photoToUse;
                        localStorage.setItem('quanic_user_photo', photoToUse);
                    }
                }
            } else {
                window.location.replace("login.html");
            }
        });

        // 3. LOGOUT LOGIC
        logoutBtn.addEventListener('click', async () => {
            window.vibrateMedium();
            try {
                await signOut(auth);
                // Clear out ALL Quanic user-specific cached data for privacy
                localStorage.removeItem('quanic_user_name');
                localStorage.removeItem('quanic_user_photo');
                localStorage.removeItem('quanic_user_memory');
                localStorage.removeItem('quanic_user_username'); 
                localStorage.removeItem('quanic_has_profile');
                localStorage.removeItem('quanic_history');
                localStorage.removeItem('quanic_playlists');
                localStorage.removeItem('quanic_last_played');
                localStorage.removeItem('quanic_settings_whole_page'); 
                
                window.location.replace("login.html");
            } catch (error) {
                console.error("Error logging out:", error);
                showToast("Error logging out.");
            }
        });

        // 4. STORE WHOLE PAGE TO LOCAL STORAGE
        function cacheWholePage() {
            const mainContent = document.getElementById('settings-main-content');
            if (mainContent) {
                localStorage.setItem('quanic_settings_whole_page', mainContent.innerHTML);
            }
        }
        
        // Execute the cache after a slight delay to ensure dynamic data is loaded
        setTimeout(cacheWholePage, 2500);

    </script>
</body>
</html>
