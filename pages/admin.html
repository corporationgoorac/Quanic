<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#121212">
    <title>Quanic | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <style>
        /* ==========================================================================
           1. CORE QUANIC THEME & RESET
           ========================================================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0px; background: transparent; display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        html, body {
            height: 100vh; height: 100dvh; width: 100vw; overflow: hidden;
            background-color: #121212; color: #ffffff; font-family: 'Inter', sans-serif;
            position: fixed; left: 0; top: 0; overscroll-behavior: none;
            user-select: none; -webkit-user-select: none;
        }

        .brand-text { background: linear-gradient(90deg, #E1306C, #FF7A00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .material-symbols-rounded { display: inline-block; vertical-align: middle; }

        /* ==========================================================================
           2. SCREENS & OVERLAYS
           ========================================================================== */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #121212; z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .screen.active { opacity: 1; pointer-events: auto; }

        /* Loader & Access Denied */
        .loader-spinner { width: 40px; height: 40px; border: 3px solid rgba(225, 48, 108, 0.3); border-top-color: #E1306C; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .denied-text { color: #E1306C; font-size: 1.5rem; font-weight: 700; margin-top: 20px; text-align: center; }
        .denied-sub { color: rgba(255,255,255,0.5); font-size: 0.95rem; margin-top: 10px; }

        /* ==========================================================================
           3. PIN PAD SCREEN
           ========================================================================== */
        .pin-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 30px; letter-spacing: 1px; color: rgba(255,255,255,0.9); }
        .pin-dots { display: flex; gap: 15px; margin-bottom: 50px; }
        .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); transition: all 0.2s; }
        .pin-dot.filled { background: #E1306C; border-color: #E1306C; box-shadow: 0 0 10px rgba(225, 48, 108, 0.5); }
        .pin-dot.error { background: #ff4444; border-color: #ff4444; box-shadow: 0 0 10px rgba(255, 68, 68, 0.5); }
        
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 280px; }
        .num-btn { width: 75px; height: 75px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 1.8rem; font-weight: 400; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.1s; }
        .num-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.95); }
        .num-btn.empty { background: transparent; border: none; pointer-events: none; }
        .num-btn.action { font-size: 1.2rem; color: #A7A7A7; background: transparent; border: none; }

        /* ==========================================================================
           4. DASHBOARD MAIN 
           ========================================================================== */
        #dashboard-screen { display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start; z-index: 5; }
        
        header { width: 100%; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: env(safe-area-inset-top) 20px 0 20px; background: rgba(18,18,18,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; z-index: 20; position: relative; }
        .header-title { font-size: 1.3rem; letter-spacing: -0.5px; }
        
        .metrics-bar { width: 100%; display: flex; gap: 15px; padding: 15px 20px; background: #121212; flex-shrink: 0; }
        .metric-card { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.02); border-radius: 16px; padding: 15px; display: flex; flex-direction: column; }
        .metric-title { font-size: 0.8rem; color: #A7A7A7; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; }
        .metric-value { font-size: 1.6rem; font-weight: 800; color: #fff; }
        .metric-value.active-users { color: #27c93f; }

        .search-container { width: 100%; padding: 0 20px 15px 20px; background: #121212; flex-shrink: 0; display: flex; gap: 10px; }
        .search-box-wrapper { flex: 1; display: flex; background: rgba(255,255,255,0.05); border-radius: 16px; padding: 12px 18px; align-items: center; border: 1px solid rgba(255,255,255,0.02); }
        .search-box-wrapper input { background: none; border: none; color: white; outline: none; width: 100%; margin-left: 12px; font-size: 0.95rem; }
        .search-box-wrapper input::placeholder { color: rgba(255,255,255,0.3); }
        .load-all-btn { background: rgba(225, 48, 108, 0.15); border: 1px solid rgba(225, 48, 108, 0.4); color: #E1306C; padding: 0 15px; border-radius: 16px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: transform 0.1s; white-space: nowrap; }
        .load-all-btn:active { transform: scale(0.95); }

        .users-list { width: 100%; flex: 1; overflow-y: auto; padding: 0 20px 100px 20px; display: flex; flex-direction: column; gap: 10px; }
        .user-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 12px 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: background 0.2s; position: relative; }
        .user-card:active { background: rgba(255,255,255,0.08); }
        .user-avatar-wrap { position: relative; }
        .user-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: #282828; }
        .status-dot { position: absolute; bottom: 0; right: 0; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #121212; background: #888; }
        .status-dot.online { background: #27c93f; }
        .user-info { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .user-name { font-size: 1rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-sub { font-size: 0.8rem; color: #A7A7A7; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .admin-badge { background: linear-gradient(90deg, #E1306C, #FF7A00); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; font-weight: 800; text-transform: uppercase; margin-left: 8px; vertical-align: middle; }

        /* ==========================================================================
           5. USER DETAILS SLIDE-IN MODAL
           ========================================================================== */
        #user-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; z-index: 5000; transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column;
        }
        #user-modal.open { transform: translateX(0); }

        .modal-header { height: 70px; display: flex; align-items: center; padding: env(safe-area-inset-top) 20px 0 20px; background: rgba(18,18,18,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; z-index: 10; }
        .back-btn { background: none; border: none; color: white; display: flex; align-items: center; font-size: 1.1rem; font-weight: 600; cursor: pointer; gap: 5px; }
        .back-btn .material-symbols-rounded { font-size: 28px; margin-left: -8px; }

        .modal-body { flex: 1; overflow-y: auto; padding-bottom: 50px; }
        
        .profile-hero { display: flex; flex-direction: column; align-items: center; padding: 30px 20px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .hero-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hero-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 5px; text-align: center; }
        .hero-uid { font-size: 0.8rem; color: #A7A7A7; font-family: monospace; margin-bottom: 15px; }
        .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; background: rgba(255,255,255,0.08); }
        .status-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: #888; }
        .status-pill.online .dot { background: #27c93f; box-shadow: 0 0 8px #27c93f; }
        .status-pill.online { color: #27c93f; background: rgba(39, 201, 63, 0.1); }
        .last-active-text { font-size: 0.8rem; color: #888; margin-top: 10px; }

        .section-title { font-size: 1.1rem; font-weight: 700; color: rgba(255,255,255,0.9); padding: 25px 20px 10px 20px; }

        /* Now Playing Box */
        .now-playing-box { margin: 0 20px; background: linear-gradient(135deg, rgba(225,48,108,0.15), rgba(255,122,0,0.15)); border: 1px solid rgba(225,48,108,0.3); border-radius: 16px; padding: 15px; display: none; align-items: center; gap: 15px; }
        .now-playing-box.active { display: flex; }
        .now-playing-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .np-info { flex: 1; overflow: hidden; }
        .np-label { font-size: 0.7rem; font-weight: 800; color: #E1306C; text-transform: uppercase; margin-bottom: 4px; display: flex; align-items: center; gap: 4px;}
        .np-label .material-symbols-rounded { font-size: 14px; }
        .np-title { font-size: 1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .np-artist { font-size: 0.8rem; color: rgba(255,255,255,0.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .equalizer { display: flex; gap: 2px; align-items: flex-end; height: 12px; }
        .eq-bar { width: 3px; background: #E1306C; border-radius: 1px; animation: bounce 0.5s infinite alternate; }
        .eq-bar:nth-child(2) { animation-delay: 0.2s; } .eq-bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0% { height: 3px; } 100% { height: 12px; } }

        /* History Track Items */
        .history-list { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
        .track-item { display: flex; align-items: center; padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.03); }
        .track-item img { width: 48px; height: 48px; border-radius: 8px; margin-right: 15px; object-fit: cover; }
        .track-info { display: flex; flex-direction: column; overflow: hidden; flex: 1; }
        .track-title { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { color: #A7A7A7; font-size: 0.8rem; margin-top: 4px; }
        .track-index { width: 25px; font-size: 0.85rem; font-weight: 700; color: #666; text-align: center; margin-right: 10px; }

        .empty-state { text-align: center; padding: 30px; color: #666; font-size: 0.9rem; }

        /* Toast */
        .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: rgba(40, 40, 40, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: white; padding: 12px 24px; border-radius: 30px; font-size: 0.95rem; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 9999; transition: top 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .toast.show { top: calc(env(safe-area-inset-top) + 20px); }
        .toast.error { border-color: #ff4444; color: #ff4444; }

    </style>
</head>
<body>

    <div id="auth-screen" class="screen active">
        <div class="loader-spinner"></div>
    </div>

    <div id="denied-screen" class="screen">
        <span class="material-symbols-rounded" style="font-size: 60px; color:#E1306C;">gpp_bad</span>
        <div class="denied-text">Access Denied</div>
        <div class="denied-sub">Administrative privileges required.</div>
    </div>

    <div id="pin-screen" class="screen">
        <div class="pin-title">Enter Admin PIN</div>
        <div class="pin-dots">
            <div class="pin-dot" id="dot-1"></div>
            <div class="pin-dot" id="dot-2"></div>
            <div class="pin-dot" id="dot-3"></div>
            <div class="pin-dot" id="dot-4"></div>
        </div>
        <div class="numpad">
            <button class="num-btn" onclick="enterPin('1')">1</button>
            <button class="num-btn" onclick="enterPin('2')">2</button>
            <button class="num-btn" onclick="enterPin('3')">3</button>
            <button class="num-btn" onclick="enterPin('4')">4</button>
            <button class="num-btn" onclick="enterPin('5')">5</button>
            <button class="num-btn" onclick="enterPin('6')">6</button>
            <button class="num-btn" onclick="enterPin('7')">7</button>
            <button class="num-btn" onclick="enterPin('8')">8</button>
            <button class="num-btn" onclick="enterPin('9')">9</button>
            <button class="num-btn empty"></button>
            <button class="num-btn" onclick="enterPin('0')">0</button>
            <button class="num-btn action" onclick="deletePin()">
                <span class="material-symbols-rounded">backspace</span>
            </button>
        </div>
    </div>

    <div id="dashboard-screen" class="screen">
        <header>
            <div class="header-title brand-text">Quanic Admin</div>
        </header>

        <div class="metrics-bar">
            <div class="metric-card">
                <span class="metric-title">Total Users</span>
                <span class="metric-value" id="total-users-val">--</span>
            </div>
            <div class="metric-card">
                <span class="metric-title">Active Now</span>
                <span class="metric-value active-users" id="active-users-val">0</span>
            </div>
        </div>

        <div class="search-container">
            <div class="search-box-wrapper">
                <span class="material-symbols-rounded" style="color:#A7A7A7; font-size: 20px;">search</span>
                <input type="text" id="search-input" placeholder="Search by name or UID..." autocomplete="off">
            </div>
            <button class="load-all-btn" id="load-all-btn" onclick="fetchAllFirestoreUsers()">Load All</button>
        </div>

        <div class="users-list" id="users-list-container">
            </div>
    </div>

    <div id="user-modal">
        <div class="modal-header">
            <button class="back-btn" onclick="history.back()">
                <span class="material-symbols-rounded">chevron_left</span> Back
            </button>
        </div>
        
        <div class="modal-body">
            <div class="profile-hero">
                <img src="" alt="Avatar" class="hero-avatar" id="modal-avatar">
                <div class="hero-name" id="modal-name">User Name</div>
                <div class="hero-uid" id="modal-uid">uid_placeholder</div>
                
                <div class="status-pill" id="modal-status-pill">
                    <div class="dot"></div> <span id="modal-status-text">Offline</span>
                </div>
                <div class="last-active-text" id="modal-last-active">Last Active: Unknown</div>
            </div>

            <div class="now-playing-box" id="modal-np-box">
                <img src="" id="modal-np-img" class="now-playing-img">
                <div class="np-info">
                    <div class="np-label">
                        <span class="material-symbols-rounded">graphic_eq</span> Now Playing
                    </div>
                    <div class="np-title" id="modal-np-title">Song Title</div>
                    <div class="np-artist" id="modal-np-artist">Artist</div>
                </div>
                <div class="equalizer">
                    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                </div>
            </div>

            <div class="section-title">Recent Listening History</div>
            <div class="history-list" id="modal-history-list">
                </div>
        </div>
    </div>

    <div id="global-toast" class="toast">
        <span class="material-symbols-rounded" id="toast-icon">info</span>
        <span id="toast-msg">Message</span>
    </div>

    <script type="module">
        import { auth, db } from '../config.js'; // Firestore & Auth
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { collection, query, limit, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        // Initialize RTDB natively 
        let rtdb;
        try { rtdb = getDatabase(); } catch(e) { console.error("RTDB init failed", e); }

        // DOM Elements
        const authScreen = document.getElementById('auth-screen');
        const deniedScreen = document.getElementById('denied-screen');
        const pinScreen = document.getElementById('pin-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const dots = [document.getElementById('dot-1'), document.getElementById('dot-2'), document.getElementById('dot-3'), document.getElementById('dot-4')];
        
        const usersListContainer = document.getElementById('users-list-container');
        const searchInput = document.getElementById('search-input');
        const totalUsersVal = document.getElementById('total-users-val');
        const activeUsersVal = document.getElementById('active-users-val');
        
        const userModal = document.getElementById('user-modal');

        // State Variables
        let currentUserAdmin = null;
        let firestoreUsers = []; 
        let rtdbCache = {}; // UID -> { status, lastActive, nowPlaying }

        // UX Helper
        window.vibrate = (ms) => { if(navigator.vibrate) navigator.vibrate(ms); };
        window.showToast = (msg, isError = false) => {
            const toast = document.getElementById('global-toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerText = isError ? 'error' : 'check_circle';
            toast.className = 'toast show ' + (isError ? 'error' : '');
            setTimeout(() => toast.classList.remove('show'), 2500);
        };

        // Time Formatter
        function timeAgo(timestamp) {
            if (!timestamp) return "Unknown";
            const now = new Date();
            let past;
            // Handle both Firestore Timestamps and raw JS ms integers from RTDB
            if (typeof timestamp === 'number') { past = new Date(timestamp); } 
            else if (timestamp.toDate) { past = timestamp.toDate(); } 
            else { past = new Date(timestamp); }
            
            const diffMs = now - past;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffMins < 1) return "Just now";
            if (diffMins < 60) return `${diffMins} min${diffMins > 1 ? 's' : ''} ago`;
            if (diffHours < 24) return `${diffHours} hr${diffHours > 1 ? 's' : ''} ago`;
            if (diffDays === 1) return "Yesterday";
            return past.toLocaleDateString();
        }

        // =========================================================
        // 1. SECURITY ROUTING
        // =========================================================
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const docSnap = await getDoc(doc(db, 'users', user.uid));
                    if (docSnap.exists() && docSnap.data().admin === true) {
                        currentUserAdmin = user;
                        authScreen.classList.remove('active');
                        pinScreen.classList.add('active'); 
                    } else {
                        authScreen.classList.remove('active');
                        deniedScreen.classList.add('active');
                    }
                } catch(e) {
                    authScreen.classList.remove('active');
                    deniedScreen.classList.add('active');
                }
            } else {
                window.location.replace("login.html");
            }
        });

        // =========================================================
        // 2. PIN PAD LOGIC (Target: 2502)
        // =========================================================
        let currentPin = '';
        const TARGET_PIN = '2502';

        window.enterPin = (num) => {
            if (currentPin.length < 4) {
                currentPin += num;
                window.vibrate(10);
                updatePinUI();
                if (currentPin.length === 4) verifyPin();
            }
        };

        window.deletePin = () => {
            if (currentPin.length > 0) {
                currentPin = currentPin.slice(0, -1);
                window.vibrate(10);
                updatePinUI();
            }
        }

        function updatePinUI() {
            dots.forEach((dot, index) => {
                dot.className = 'pin-dot';
                if (index < currentPin.length) dot.classList.add('filled');
            });
        }

        function verifyPin() {
            if (currentPin === TARGET_PIN) {
                window.vibrate([15, 20, 15]); // Success
                setTimeout(() => {
                    pinScreen.classList.remove('active');
                    dashboardScreen.classList.add('active');
                    startAdminEngine();
                }, 300);
            } else {
                window.vibrate(50); // Error
                dots.forEach(dot => dot.classList.add('error'));
                setTimeout(() => {
                    currentPin = '';
                    updatePinUI();
                }, 500);
            }
        }

        // =========================================================
        // 3. ADMIN ENGINE: FIRESTORE & RTDB SYNC
        // =========================================================
        function startAdminEngine() {
            // 1. Hook into RTDB for live status updates globally
            if(rtdb) {
                const usersRef = ref(rtdb, 'users');
                onValue(usersRef, (snapshot) => {
                    if (snapshot.exists()) {
                        rtdbCache = snapshot.val();
                        updateLiveMetrics();
                        renderUsersList(); // Re-render list to reflect status changes
                        updateActiveModalLive(); // If modal is open, update its live data
                    }
                });
            }
            
            // 2. Fetch initial batch of Firestore profiles
            fetchInitialFirestoreUsers();
        }

        function updateLiveMetrics() {
            let activeCount = 0;
            for (const uid in rtdbCache) {
                if (rtdbCache[uid].status === 'online') activeCount++;
            }
            activeUsersVal.innerText = activeCount;
        }

        async function fetchInitialFirestoreUsers() {
            try {
                const q = query(collection(db, 'users'), limit(25));
                const querySnapshot = await getDocs(q);
                
                firestoreUsers = [];
                querySnapshot.forEach((doc) => { firestoreUsers.push({ id: doc.id, ...doc.data() }); });
                
                totalUsersVal.innerText = firestoreUsers.length + "+";
                renderUsersList();
            } catch(e) { console.error("FS Fetch Error", e); }
        }

        window.fetchAllFirestoreUsers = async () => {
            const btn = document.getElementById('load-all-btn');
            btn.innerText = "Loading...";
            btn.style.pointerEvents = 'none';

            try {
                const querySnapshot = await getDocs(collection(db, 'users'));
                firestoreUsers = [];
                querySnapshot.forEach((doc) => { firestoreUsers.push({ id: doc.id, ...doc.data() }); });
                
                totalUsersVal.innerText = firestoreUsers.length;
                renderUsersList();
                showToast("All users loaded!");
            } catch(e) {
                showToast("Failed to load full database", true);
            } finally {
                btn.innerText = "Loaded";
            }
        };

        // Render Dashboard UI
        function renderUsersList() {
            const term = searchInput.value.toLowerCase();
            const filtered = firestoreUsers.filter(u => {
                const n = (u.name || "").toLowerCase();
                const id = u.id.toLowerCase();
                return n.includes(term) || id.includes(term);
            });

            usersListContainer.innerHTML = '';
            
            if(filtered.length === 0) {
                usersListContainer.innerHTML = `<div class="empty-state">No users found. Try 'Load All'</div>`;
                return;
            }

            // Sort: Online users first
            filtered.sort((a, b) => {
                const aOnline = rtdbCache[a.id]?.status === 'online' ? 1 : 0;
                const bOnline = rtdbCache[b.id]?.status === 'online' ? 1 : 0;
                return bOnline - aOnline;
            });

            filtered.forEach(user => {
                const liveData = rtdbCache[user.id] || {};
                const isOnline = liveData.status === 'online';
                const subText = liveData.nowPlaying?.isPlaying ? `🎵 Listening: ${liveData.nowPlaying.title}` : (isOnline ? 'Active Now' : `Last seen: ${timeAgo(liveData.lastActive)}`);

                const card = document.createElement('div');
                card.className = 'user-card';
                card.onclick = () => openUserDetailsModal(user);
                
                card.innerHTML = `
                    <div class="user-avatar-wrap">
                        <img src="${user.photoURL || '../images/icon.png'}" class="user-avatar" onerror="this.src='../images/icon.png'">
                        <div class="status-dot ${isOnline ? 'online' : ''}"></div>
                    </div>
                    <div class="user-info">
                        <div class="user-name">
                            ${user.name || 'Unknown User'}
                            ${user.admin ? `<span class="admin-badge">Admin</span>` : ''}
                        </div>
                        <div class="user-sub" style="${liveData.nowPlaying?.isPlaying ? 'color:#E1306C; font-weight:600;' : ''}">${subText}</div>
                    </div>
                `;
                usersListContainer.appendChild(card);
            });
        }

        searchInput.addEventListener('input', renderUsersList);

        // =========================================================
        // 4. USER DETAILS MODAL (MOBILE BACKABLE & LIVE SYNC)
        // =========================================================
        let activeModalUserId = null;

        window.openUserDetailsModal = async (user) => {
            activeModalUserId = user.id;
            window.vibrate(10);
            
            // Basic Static Info
            document.getElementById('modal-avatar').src = user.photoURL || '../images/icon.png';
            document.getElementById('modal-name').innerText = user.name || 'Unknown User';
            document.getElementById('modal-uid').innerText = user.id;

            // Initialize Live Data UI
            updateActiveModalLive();

            // Clear History UI and show loader
            const historyList = document.getElementById('modal-history-list');
            historyList.innerHTML = '<div class="loader-spinner" style="margin: 30px auto; width: 30px; height: 30px;"></div>';

            // Push State to Open Modal
            userModal.classList.add('open');
            history.pushState({ modalOpen: 'user_details' }, "", `#user_${user.id}`);

            // Fetch History from Firestore Background
            try {
                const histRef = doc(db, 'users', user.id, 'playerData', 'history');
                const histSnap = await getDoc(histRef);
                
                historyList.innerHTML = ''; // Clear loader
                
                if (histSnap.exists() && histSnap.data().tracks && histSnap.data().tracks.length > 0) {
                    const tracks = histSnap.data().tracks;
                    tracks.forEach((track, idx) => {
                        const div = document.createElement('div');
                        div.className = 'track-item';
                        div.innerHTML = `
                            <div class="track-index">${idx + 1}</div>
                            <img src="${track.imgUrl}" onerror="this.src='../images/icon.png'">
                            <div class="track-info">
                                <div class="track-title">${track.title}</div>
                                <div class="track-artist">${track.artist}</div>
                            </div>
                        `;
                        historyList.appendChild(div);
                    });
                } else {
                    historyList.innerHTML = '<div class="empty-state">No listening history found for this user.</div>';
                }
            } catch(e) {
                historyList.innerHTML = '<div class="empty-state">Error loading history.</div>';
            }
        };

        // Keeps the modal UI perfectly synced if the user comes online/offline or changes song while admin is watching
        function updateActiveModalLive() {
            if (!activeModalUserId) return;
            const liveData = rtdbCache[activeModalUserId] || {};
            
            // Status Badge Update
            const isOnline = liveData.status === 'online';
            const pill = document.getElementById('modal-status-pill');
            const statusText = document.getElementById('modal-status-text');
            const lastActive = document.getElementById('modal-last-active');

            if (isOnline) {
                pill.classList.add('online');
                statusText.innerText = "Online";
                lastActive.innerText = "Active right now";
            } else {
                pill.classList.remove('online');
                statusText.innerText = "Offline";
                lastActive.innerText = `Last Active: ${timeAgo(liveData.lastActive)}`;
            }

            // Now Playing Box Update
            const npBox = document.getElementById('modal-np-box');
            if (liveData.nowPlaying && liveData.nowPlaying.isPlaying) {
                document.getElementById('modal-np-img').src = liveData.nowPlaying.imgUrl;
                document.getElementById('modal-np-title').innerText = liveData.nowPlaying.title;
                document.getElementById('modal-np-artist').innerText = liveData.nowPlaying.artist;
                npBox.classList.add('active');
            } else {
                npBox.classList.remove('active');
            }
        }

        // Hardware back button mapping
        window.addEventListener('popstate', (e) => {
            const state = e.state ? e.state.modalOpen : null;
            if (!state || state !== 'user_details') {
                userModal.classList.remove('open');
                activeModalUserId = null;
            }
        });

    </script>
</body>
</html>
