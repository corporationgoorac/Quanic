<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="theme-color" content="#121212">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Quanic | Goorac Corporation</title>
    
    <style>
        /* 1. Core Reset & Exact Home Page Theme Match */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* FIX: Locked viewport identical to home.html to guarantee stability */
        html, body {
            width: 100vw !important;
            height: 100vh !important;
            height: 100dvh !important;
            background-color: #121212 !important; /* Updated to Quanic Professional Dark Theme */
            color: #ffffff;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            overflow: hidden !important;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            overscroll-behavior: none !important;
        }

        /* 2. Logo Wrapper with Smooth Reveal */
        .logo-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: logo-reveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .logo-wrapper img {
            width: 160px; /* Flagship size */
            height: auto;
            /* Updated: Matches the vibrant pink/magenta from your Quanic logo */
            filter: drop-shadow(0 0 40px rgba(225, 48, 108, 0.4));
            z-index: 2;
        }

        /* 3. The Powered By Branding */
        .brand-footer {
            position: absolute;
            bottom: calc(env(safe-area-inset-bottom) + 40px);
            text-align: center;
            opacity: 0;
            animation: footer-fade 1.2s ease 0.8s forwards;
        }

        .brand-text {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 500;
        }

        /* 4. Elegant Animations */
        @keyframes logo-reveal {
            0% { 
                opacity: 0; 
                transform: scale(0.85) translateY(20px); 
                filter: blur(10px);
            }
            100% { 
                opacity: 1; 
                transform: scale(1) translateY(0); 
                filter: blur(0);
            }
        }

        @keyframes footer-fade {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="logo-wrapper">
        <img src="./images/icon.png" alt="Quanic" id="splash-logo">
    </div>

    <div class="brand-footer">
        <span class="brand-text">Powered by Goorac</span>
    </div>

    <script>
        const cachedLogo = localStorage.getItem('quanic_logo_base64');
        if(cachedLogo) {
            document.getElementById('splash-logo').src = cachedLogo;
        }
    </script>

    <script type="module">
        import { auth } from './config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        // We use a listener to check if the user is already logged in
        onAuthStateChanged(auth, (user) => {
            // Give the user 2.5 seconds to see the beautiful splash
            setTimeout(() => {
                if (user) {
                    // Session found: Go to Home
                    window.location.replace("pages/home.html");
                } else {
                    // No session: Go to Login
                    window.location.replace("pages/login.html");
                }
            }, 2500);
        });
    </script>
</body>
</html>
